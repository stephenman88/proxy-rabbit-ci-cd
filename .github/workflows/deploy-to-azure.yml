name: Build and Deploy to Azure
env:
  AZURE_WEBAPP_WEB_NAME: proxy-rabbit-web
  AZURE_WEBAPP_API_NAME: proxy-rabbit-api
on:
  push:
    branches:
      - main
permissions: 
  contents: 'read'
  packages: 'write'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}
      - name: Lowercase the repo name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}
      - name: Build and push web container image to registry
        uses: docker/build-push-action@v6
        with:
          push: true
          context: ./proxy-rabbit
          tags: ghcr.io/${{env.REPO}}/web:${{github.sha}}
          file: ./proxy-rabbit/Dockerfile.prod
      - name: Build and push api container image to registry
        uses: docker/build-push-action@v6
        with:
          push: true
          context: ./proxy-rabbit-api
          tags: ghcr.io/${{env.REPO}}/api:${{github.sha}}
          file: ./proxy-rabbit-api/Dockerfile.prod
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Lowercase the repo name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}
      - name: Deploy Web to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{env.AZURE_WEBAPP_WEB_NAME}}
          publish-profile: ${{secrets.AZURE_WEBAPP_WEB_PUBLISH_PROFILE}}
          images: 'ghcr.io/${{env.REPO}}/web:${{github.sha}}'
      - name: Deploy Api to Azure api App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{env.AZURE_WEBAPP_API_NAME}}
          publish-profile: ${{secrets.AZURE_WEBAPP_API_PUBLISH_PROFILE}}
          images: 'ghcr.io/${{env.REPO}}/web:${{github.sha}}'
