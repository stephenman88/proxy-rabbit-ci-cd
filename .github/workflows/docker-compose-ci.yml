name: Docker Compose CI
run-name: ${{github.actor}} is testing through docker compose
on: [push]
jobs:
    Test-Run:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: [actions/checkout@v5](https://github.com)
            - name: Build and run Docker Compose stack
              run: docker compose up -d --build
            - name: Check running containers
              run: docker ps
            - name: wait for database to be healthy
              run: sleep 10
            - name: Run application test
              run: docker compose exec web npm test
              run: docker compose exec api node index.js
            - name: Clean up containers
              if: always()
              run: docker compose down